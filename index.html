<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2주년 기념 & 부산 여행 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="intro-screen">
        <div class="overlay"></div>
        <div class="bg-circles">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>
        
        <div class="intro-content">
            <h1 class="main-title">🌸 2nd Anniversary 🌸</h1>
            <b class="sub-title">2주년 & 부산 여행 기념 이벤트 </b>
            
            <div class="photo-album">
                <div class="polaroid p1">
                    <img src="푸토리코.jpg" alt="추억1">
                    <p class="caption">이때 우리 정말 좋았는데 우헤헤</p>
                </div>

                <div class="polaroid p2">
                    <img src="퀘백음식.jpg" alt="추억2">
                    <p class="caption">맛있는 거 먹으러 갔던 날! 또 가고 싶다 ㅎㅎ</p>
                </div>

                <div class="polaroid p3"> <!-- 전체 클릭 시 확대 -->
                    <div class="album-viewport">
                        <div id="p3-slides" class="album-slides">
                            <img src="111.jpg" alt="추억3-1">
                            <img src="123.jpg" alt="추억3-2">
                            <img src="나.jpg" alt="추억3-3">
                        </div>
                        <!-- 버튼 클릭 시 event.stopPropagation()이 확대 기능을 막아줍니다 -->
                        <button class="slide-btn prev" onclick="moveP3Slide(-1, event)">&#10094;</button>
                        <button class="slide-btn next" onclick="moveP3Slide(1, event)">&#10095;</button>
                    </div>
                    <p class="caption">2년 동안 행복했어ㅎㅎ 앞으로도 잘 부탁해</p>
                </div>
            </div>

            <button id="start-btn">퀴즈 시작! ❤️</button>

            <div id="password-modal" class="modal">
                <div class="modal-content">
                    <h4>지원이 아니면 못풀어 ㅡ,ㅡ </h4>
                    <p class="pw-hint">힌트: 우리 커플에게 가장 소중한 날 (YY/MM/DD)</p>
                    <input type="text" id="pw-input" placeholder="뭘까용식" maxlength="8">
                    <div class="modal-btns">
                        <button id="pw-submit">확인</button>
                        <button id="pw-close">닫기</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main id="quiz-screen" style="display: none;">
        <button id="menu-open-btn" onclick="toggleNav(true)">☰ 목록</button>

        <div id="side-nav" class="side-nav">
            <div class="nav-header">
                <span>문제 목록</span>
                <button onclick="toggleNav(false)">X</button>
            </div>

            <div id="nav-list" class="nav-list"> </div>

            <div class="nav-footer">
                <button class="home-btn" onclick="goToHome()">🏠 처음 화면으로</button>
            </div>

        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <!-- 걍 아키텍쳐 하세요... 전자,전기 회로 공부하고, 나중엔 양자컴 골부하세요... 하드웨어부터 소프트웨어까지 다 알면 돈 많이 법니다." -->
        <div id="quiz-container">
            <div id="question-box">
                <p id="question-text">문제가 여기에 나타납니다.</p>
                <div id="media-content"></div>
                <div id="options-container"></div>
            </div>
        </div>

        <nav class="button-group">
            <button id="prev-btn" onclick="changeQuestion(-1)">이전으로</button>
            <button id="next-btn" onclick="changeQuestion(1)">다음으로</button>
        </nav>
    </main>

    <section id="result-screen" style="display: none;">
        <div id="result-box">
            <h2>🎉 퀴즈 끝! 🎉</h2>
            <div id="score-display"></div>
            <p id="result-comment"></p>
            <div id="wrong-answers-section">
                <h3>오답 노트 (다음에 꼭 기억하기!)</h3>
                <ul id="wrong-list"></ul>
            </div>
            <button class="reward-btn" onclick="location.reload()">다시 하기</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
