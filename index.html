<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2주년 기념 & 부산 여행 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="intro-screen">
        <div class="overlay"></div>
        <div class="bg-circles">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>
        
        <div class="intro-content">
            <h1 class="main-title">🌸 2nd Anniversary 🌸</h1>
            <b class="sub-title">2주년 & 부산 여행 기념 이벤트 </b>
            
            <div class="photo-album">
                <!-- 폴라로이드 p1 지원-->
                <div class="polaroid p1">
                    <div class="album-viewport">
                        <div id="p1-slides" class="album-slides">
                            <img src="지원13.jpg" alt="추억1-1">
                            <img src="지원15.jpg" alt="추억1-2">
                            <img src="지원14.jpg" alt="추억1-3">
                            <img src="지원11.jpg" alt="추억1-5">
                            <img src="지원9.jpg" alt="추억1-7">
                            <img src="지원8.jpg" alt="추억1-8">
                            <img src="지원7.jpg" alt="추억1-9">
                            <img src="지원6.jpg" alt="추억1-9">
                            <img src="지원4.jpg" alt="추억1-9">
                            <img src="지원5.jpg" alt="추억1-10">
                            <img src="지원2.jpg" alt="추억1-10">
                            <img src="지원1.jpg" alt="추억1-11">
                            <img src="지원3.jpg" alt="추억1-12">
                            <img src="지원9.jpg" alt="추억1-7">
                            <img src="지원12.jpg" alt="추억1-4">
                        </div>
                        <button class="slide-btn prev" onclick="moveAlbumSlide('p1', -1, event)">&#10094;</button>
                        <button class="slide-btn next" onclick="moveAlbumSlide('p1', 1, event)">&#10095;</button>
                    </div>
                    <p class="caption">2년 동안 행복했어ㅎㅎ 앞으로도 잘 부탁해</p>
                </div>

                <!-- 폴라로이드 p2 음식 -->
                <div class="polaroid p2">
                    <div class="album-viewport">
                        <div id="p2-slides" class="album-slides">
                            <img src="퀘백음식.jpg" alt="추억2-1">
                            <img src="음식2.jpg" alt="추억2-2">
                            <img src="음식4.jpg" alt="추억2-2">
                            <img src="음식5.jpg" alt="추억2-2">
                            <img src="음식6.jpg" alt="추억2-2">                            <img src="음식3.jpg" alt="추억2-2">
                            <img src="음식7.jpg" alt="추억2-2">
                            <img src="음8.jpg" alt="추억2-2">
                            <img src="음9.jpg" alt="추억2-2">
                            <img src="골벵이소면.jpg" alt="추억2-2">
                        </div>
                        <button class="slide-btn prev" onclick="moveAlbumSlide('p2', -1, event)">&#10094;</button>
                        <button class="slide-btn next" onclick="moveAlbumSlide('p2', 1, event)">&#10095;</button>
                    </div>
                    <p class="caption">이것들 너무 맛있게 먹었었는데ㅎ</p>
                </div>

                <!-- 폴라로이드 p3 좋-->
                <div class="polaroid p3">
                    <div class="album-viewport">
                        <div id="p3-slides" class="album-slides">
                            <img src="푸토리코.jpg" alt="추억3-1">
                            <img src="좋2.jpg" alt="추억3-2">
                            <img src="시카고둘이.jpg" alt="추억3-3">
                            <img src="좋1.jpg" alt="추억3-4">
                            <img src="좋5.jpg" alt="추억3-5">
                            <img src="좋7.jpg" alt="추억3-6">
                            <img src="좋10.jpg" alt="추억3-6">
                            <img src="레이크타호.jpg" alt="추억3-7">
                        </div>
                        <button class="slide-btn prev" onclick="moveAlbumSlide('p3', -1, event)">&#10094;</button>
                        <button class="slide-btn next" onclick="moveAlbumSlide('p3', 1, event)">&#10095;</button>
                    </div>
                    <p class="caption">이때 우리 정말 좋았는데 우헤헤</p>
                </div>
            </div>
            <button id="start-btn">퀴즈 시작! ❤️</button>

            <div id="password-modal" class="modal">
                <div class="modal-content">
                    <h4>지원이 아니면 못풀어 ㅡ,ㅡ </h4>
                    <p class="pw-hint">힌트: 우리 커플에게 가장 소중한 날 (YY/MM/DD)</p>
                    <input type="text" id="pw-input" placeholder="뭘까용식" maxlength="8">
                    <div class="modal-btns">
                        <button id="pw-submit">확인</button>
                        <button id="pw-close">닫기</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main id="quiz-screen" style="display: none;">
        <button id="menu-open-btn" onclick="toggleNav(true)">☰ 목록</button>

        <div id="side-nav" class="side-nav">
            <div class="nav-header">
                <span>문제 목록</span>
                <button onclick="toggleNav(false)">X</button>
            </div>

            <div id="nav-list" class="nav-list"> </div>

            <div class="nav-footer">
                <button class="home-btn" onclick="goToHome()">🏠 처음 화면으로</button>
            </div>

        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <!-- 걍 아키텍쳐 하세요... 전자,전기 회로 공부하고, 나중엔 양자컴 골부하세요... 하드웨어부터 소프트웨어까지 다 알면 돈 많이 법니다." -->
        <div id="quiz-container">
            <div id="question-box">
                <p id="question-text">문제가 여기에 나타납니다.</p>
                <div id="media-content"></div>
                <div id="options-container"></div>
            </div>
        </div>
        
        <nav class="button-group">
            <button id="prev-btn" onclick="changeQuestion(-1)">이전으로</button>
            <button id="next-btn" onclick="changeQuestion(1)">다음으로</button>
        </nav>
    </main>

    <section id="result-screen" style="display: none;">
        <div id="result-box">
            <h2>🎉 퀴즈 끝! 🎉</h2>
            <div id="score-display"></div>
            <p id="result-comment"></p>
            <div id="wrong-answers-section">
                <h3>오답 노트 (다음에 꼭 기억하기!)</h3>
                <ul id="wrong-list"></ul>
            </div>

            <hr style="margin: 20px 0; border: 0.5px solid #eee;">
        
            <div id="minigame-section">
                <p>보너스 미션! 5초 안에 내 얼굴을 다 찾아보시오오</p>
                <!-- 버튼을 누르면 이 버튼은 사라지고 게임 박스가 나타나야 함 -->
                <button id="minigame-start-btn" class="reward-btn" onclick="openMiniGame()">보너스 게임 시작! ❤️</button>
                
                <!-- 초기에는 숨겨둠 -->
                <div id="game-container" style="display:none;"></div>
            </div>
            <button class="reward-btn" onclick="location.reload()">다시 하기</button>
        </div>
    </section>
    <div class="music-player-container">
        <!-- 재생/일시정지 버튼 -->
        <button id="music-toggle-btn" onclick="toggleMusic()">▶</button>
        
        <!-- 재생 상태바 영역 -->
        <div class="progress-wrapper" onclick="seek(event)">
            <div id="music-progress-bar"></div>
        </div>
        
        <!-- 시간 표시 (00:00 / 03:45) -->
        <div id="music-time">00:00 / 00:00</div>
    </div>

    <!-- 유튜브 플레이어 (숨김 유지) -->
    <div id="yt-player" style="display:none;"></div>
    <script src="script.js"></script>


        <!-- 비디오 서프라이즈 모달 -->
    <div id="video-modal" class="modal-overlay" onclick="closeVideoModal()">
        <div class="modal-content1" onclick="event.stopPropagation()">
            <video id="surprise-video" controls>
                <source src="" type="video/quicktime">
                <source src="" type="video/mp4">
            </video>
            <button class="close-modal-btn" onclick="closeVideoModal()">닫기</button>
        </div>
    </div>
</body>
</html>
